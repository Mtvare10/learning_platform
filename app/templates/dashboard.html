<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background-color: #f4f4f4; text-align: center; padding-bottom: 50px; }
        .container { margin-top: 100px; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .box {
            width: 200px; height: 150px; background-color: white; border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center;
            justify-content: center; font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        .box:hover { transform: scale(1.05); }
        .instructor-box { background-color: #e0f2fe; border: 2px solid #0ea5e9; color: #0369a1; }
        .logout-btn { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #ef4444; color: white; border: none; border-radius: 5px; }
        
        #my-classrooms-section { 
            max-width: 600px; margin: 40px auto; background: white; 
            padding: 20px; border-radius: 10px; display: none; text-align: left; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.05);
        }
        .classroom-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .id-badge { background: #0ea5e9; color: white; padding: 4px 10px; border-radius: 6px; font-size: 14px; font-weight: bold; }
        .dashboard-logo {
            width: 50vw; 
    
            /* Prevents it from getting TOO small on phones */
            min-width: 250px; 
            
            /* Prevents it from getting TOO large on massive monitors */
            max-width: 800px; 
            
            /* Maintains the original shape of the image */
            height: auto; 
            
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.2));
        }
    </style>
</head>
<body>


<div class="header">
    <img src="/static/logo.png" alt="LMS Logo" class="dashboard-logo">
    <h1>Dashboard</h1>
    <h2 id="welcome-text"></h2>
    <h3 id="user-id-text"></h3>
</div>

<div class="container" id="instructor-tools" style="display: none; margin-top: 20px;">
    <div class="box instructor-box" onclick="goToCreateClassroom()">Create Classroom</div>
    <div class="box instructor-box" onclick="window.location.href='/my-classrooms-page'">
        My Classrooms </div>
    <div class="box instructor-box" onclick="window.location.href='/requests-page'">
    Pending Requests</div>
</div>

<div id="my-classrooms-section">
    <h3 style="color: #333;">My Classrooms (IDs for AI Generation)</h3>
    <div id="classroom-list" style="color: #666;">Loading your classrooms...</div>
</div>
<div class="container" id="student-tools" style="display: none; margin-top: 100px;">
    <div class="box" style="background-color: #f0fdf4; border: 2px solid #22c55e; color: #166534;" onclick="showJoinModal()">
        Join a Classroom
    </div>
    <div class="box" onclick="window.location.href='/my-enrolled-classrooms'">
        My Classrooms
    </div>
</div>

<div id="join-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.2); z-index:100;">
    <h3>Enter Instructor ID</h3>
    <input type="number" id="instructor-id-input" placeholder="e.g. 12" style="padding:10px; width:100%;">
    <br><br>
    <button onclick="sendJoinRequest()" style="background:#22c55e; color:white; border:none; padding:10px; cursor:pointer;">Send Request</button>
    <button onclick="document.getElementById('join-modal').style.display='none'">Cancel</button>
</div>
<button class="logout-btn" onclick="logout()">Logout</button>

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login";
    }

    function goToLessons() { window.location.href = "/lessons-page"; }
    function goToClassroom() { window.location.href = "/classroom-page"; }
    function showCreateLesson() { window.location.href = "/create-course-page"; }
    
    function goToCreateClassroom() {
        window.location.href = "/create-classroom-page";
    }

    function showAssignStudent() {
        alert("Opening Student Assignment Tool...");
    }

    function logout() {
        localStorage.removeItem("token");
        document.cookie = "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = "/login";
    }

    async function loadMyClassrooms() {
        try {
            const response = await fetch("/classrooms/", {
                headers: { "Authorization": "Bearer " + token }
            });
            const classrooms = await response.json();
            const listDiv = document.getElementById("classroom-list");

            if (!response.ok) throw new Error("Failed to fetch classrooms");

            if (classrooms.length === 0) {
                listDiv.innerHTML = "<p>No classrooms found. Create one to get started!</p>";
                return;
            }

            listDiv.innerHTML = classrooms.map(c => `
                <div class="classroom-item">
                    <span style="color: #333;">${c.name}</span>
                    <span class="id-badge">ID: ${c.id}</span>
                </div>
            `).join('');
        } catch (error) {
            console.error("Error fetching classrooms:", error);
            document.getElementById("classroom-list").innerText = "Failed to load classrooms.";
        }
    }

    async function loadUser() {
        try {
            const response = await fetch("/users/me", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!response.ok) {
                console.error("Server returned error:", response.status);
                logout(); 
                return;
            }

            const user = await response.json();
            
            let roleName = "user";
            if (user.roles && user.roles.length > 0) {
                roleName = typeof user.roles[0] === 'object' ? user.roles[0].name : user.roles[0];
            }

            document.getElementById("welcome-text").innerText =
                `Welcome ${roleName.charAt(0).toUpperCase() + roleName.slice(1)} - ${user.username}`;

            if (roleName.toLowerCase() === "instructor") {
                document.getElementById("user-id-text").innerText = `Your Instructor ID: ${user.id}`;
                document.getElementById("instructor-tools").style.display = "flex";
                document.getElementById("my-classrooms-section").style.display = "block";
                loadMyClassrooms();
            } else if (roleName.toLowerCase() === "student") {
                document.getElementById("student-tools").style.display = "flex";
                document.getElementById("user-id-text").innerText = `Student ID: ${user.id}`;
            }

        } catch (error) {
            console.error("Frontend Logic Error:", error);
        }
    }
    function showJoinModal() {
        document.getElementById('join-modal').style.display = 'block';
    }
    async function sendJoinRequest() {
        const instructorId = document.getElementById('instructor-id-input').value;
        const token = localStorage.getItem("token");

        if (!instructorId) {
            alert("Please enter an Instructor ID");
            return;
        }

        try {
            // This is a placeholder for your backend request route
            const response = await fetch(`/users/join-request/${instructorId}`, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"
                }
            });

            if (response.ok) {
                alert("Request sent to instructor!");
                document.getElementById('join-modal').style.display = 'none';
            } else {
                const errorData = await response.json();
                alert("Error: " + (errorData.detail || "Could not send request"));
            }
        } catch (error) {
            console.error("Network Error:", error);
            alert("Failed to connect to the server.");
        }
    }
    async function acceptStudent(requestId) {
    const classId = prompt("Enter the Classroom ID to assign this student to:");
    if (!classId) return;

    const response = await fetch(`/users/requests/${requestId}/accept?classroom_id=${classId}`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` }
    });

    if (response.ok) {
        alert("Student Accepted!");
        location.reload(); // Refresh the list
    }
}
    loadUser();
</script>

</body>
</html>
